                L.DomEvent.disableClickPropagation(div);

                    var c = map.getContainer();
                    if (cb.checked) { c.classList.remove('labels-hidden'); }
                    else { c.classList.add('labels-hidden'); }
                });
                return div;
            }
        });
        new LabelToggle().addTo(map_b7b668e97c6d41ef97af76fb113e0aef);
    })();
